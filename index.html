<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaudeChat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.6/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/decimal.js"></script>
    <!-- <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
    <script>eruda.init();</script> -->
</head>

<body>
    <div class="container">

        <div class="header">
            <div class="logo-section">
                <div class="logo-icon">💬</div>
                <div class="logo-text">
                    <h1>ClaudeChat</h1>
                    <span class="badge">Claude Sonnet 4.5</span>
                </div>
            </div>
            <div class="author-tag">by M. Krej</div>
        </div>

        <div id="chat"></div>

        <div class="input-area">
            <div class="input-container">
                <textarea id="input" placeholder="Type your message... (Shift+Enter for new line)" rows="1"></textarea>
                <button id="send">Send</button>
            </div>
            <div class="controls">
                <button class="btn-secondary" onclick="clearChat()">🗑️ Clear</button>
                <button class="btn-secondary" onclick="exportChatYAML()">💾 Export YAML</button>
                <button class="btn-secondary" onclick="document.getElementById('fileInput').click()">📂 Import
                    YAML</button>
                <button class="btn-secondary" onclick="logout()">🔓 Logout</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileInput" accept=".yaml,.yml" style="display:none" onchange="importChatYAML(this.files[0])">
    <script src="prompt.js"></script>
    <script src="claudeChat.js"></script>

</body>

</html>
